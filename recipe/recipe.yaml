schema_version: 1

context:
  name: composio-openai
  version: "0.11.6"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/composio_openai-${{ version }}.tar.gz
  sha256: af101f169af72d16281e74f8319596eaf07a3eb1952e7e10b112edde0eb4e292

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python 3.10.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }},<4.0
    - openai
    - composio

tests:
  - python:
      imports:
        - composio_openai
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Use Composio to get an array of tools with your OpenAI Function Call.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/ComposioHQ/composio

extra:
  recipe-maintainers:
    - jan-janssen
