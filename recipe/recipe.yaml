schema_version: 1

context:
  name: composio-openai
  version: "0.17.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/composio_openai-${{ version }}.tar.gz
  sha256: 44356acb723a3c6645ff2efe6799350f52b4137c0b75befec00f0ece3b36760d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }},<4.0
    - openai
    - composio

tests:
  - python:
      imports:
        - composio_openai
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Use Composio to get an array of tools with your OpenAI Function Call.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/ComposioHQ/composio

extra:
  recipe-maintainers:
    - jan-janssen
